seed: 42
output_dir: outputs/cogvideox_collision_t2v_2b_planned_sidecar

data:
  type: planned_collision
  manifest_path: data/collision_prompts/collision_prompts_20.jsonl
  root_dir: .
  synthetic_fallback: false
  num_frames: 17
  image_size: 128
  max_objects: 4
  depth_bins: 4

model:
  backend: cogvideox
  variant: none
  pretrained_model_name_or_path: THUDM/CogVideoX-2b
  rank: 8
  lora_alpha: 8

training:
  objective_mode: official_cogvideox
  reference_conditioning: text_only
  mixed_precision: fp16
  enable_slicing: true
  enable_tiling: true
  conditioning_mode: hybrid
  scene_prompt_scale: 0.08
  latent_control_scale: 0.35
  latent_control_hidden_channels: 128
  latent_control_gate_init: -2.0
  scene_token_count: 4

sampling:
  num_steps: 8
  guidance_scale: 1.5
  image_size: 128
  num_frames: 17
