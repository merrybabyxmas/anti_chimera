seed: 42
output_dir: outputs/lite3d_curriculum_smoke

data:
  type: synthetic
  synthetic_difficulty: mixed
  num_frames: 8
  image_size: 32
  max_objects: 3
  depth_bins: 6
  train_size: 64
  val_size: 16

model:
  backend: lite3d
  base_channels: 32
  prompt_vocab_size: 1024
  prompt_dim: 96
  num_train_timesteps: 1000
  max_prompt_tokens: 24
  dropout: 0.05

training:
  batch_size: 4
  eval_batch_size: 4
  num_workers: 0
  epochs: 1
  lr: 0.0002
  weight_decay: 0.0
  grad_clip: 1.0
  amp: true
  device: cuda
  sample_every: 1
  val_every: 1
  timestep_sampling_power: 1.75
  snr_weight_strength: 0.2
  snr_weight_cap: 15.0
  condition_dropout_prob: 0.05
  prompt_dropout_prob: 0.05
  ema_decay: 0.999
  ema_start_step: 100

sampling:
  num_steps: 8
  guidance_scale: 1.75
