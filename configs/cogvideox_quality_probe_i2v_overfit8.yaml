seed: 42
output_dir: outputs/cogvideox_quality_probe_i2v_overfit8

data:
  type: manifest
  manifest_path: data/viddata_curriculum/curated8_train.jsonl
  val_manifest_path: data/viddata_curriculum/curated8_val.jsonl
  root_dir: .
  synthetic_fallback: false
  num_frames: 25
  image_size: 256
  max_objects: 4
  depth_bins: 4

model:
  backend: cogvideox
  variant: none
  pretrained_model_name_or_path: THUDM/CogVideoX-5b-I2V
  rank: 8
  lora_alpha: 8

training:
  objective_mode: official_cogvideox
  reference_conditioning: first_frame_i2v
  train_batch_size: 1
  gradient_accumulation_steps: 1
  gradient_checkpointing: true
  mixed_precision: fp16
  enable_slicing: true
  enable_tiling: true
  num_workers: 0
  learning_rate: 0.00001
  lr_warmup_steps: 5
  max_train_steps: 40
  checkpointing_steps: 20
  sample_every: 20
  grad_clip: 1.0
  conditioning_mode: hybrid
  scene_prompt_scale: 0.05
  latent_control_scale: 0.10
  latent_control_warmup_steps: 20
  latent_control_hidden_channels: 128
  latent_control_gate_init: -4.0
  reference_scale: 0.0
  i2v_image_noise_sigma_mean: -3.0
  i2v_image_noise_sigma_std: 0.5
  condition_dropout_prob: 0.1
  prompt_dropout_prob: 0.0
  validation_prompt: The video shows people in a coherent scene.

sampling:
  num_steps: 12
  guidance_scale: 1.5
  image_size: 128
  num_frames: 17
  ablation_variants:
    - no_condition
    - prompt_bias_only
    - latent_control
    - full_sidecar
