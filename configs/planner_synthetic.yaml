seed: 42
output_dir: outputs/planner_synthetic

data:
  type: synthetic
  synthetic_difficulty: mixed
  num_frames: 16
  image_size: 64
  max_objects: 3
  depth_bins: 6
  train_size: 12000
  val_size: 256

planner:
  prompt_vocab_size: 4096
  hidden_size: 256
  max_prompt_tokens: 48
  num_layers: 4
  num_heads: 8
  dropout: 0.1

training:
  batch_size: 16
  eval_batch_size: 16
  num_workers: 0
  epochs: 20
  lr: 0.0002
  weight_decay: 0.0001
  grad_clip: 1.0
  amp: true
  device: cuda
  track_weight: 5.0
  depth_weight: 2.0
  visibility_weight: 1.0
  mask_weight: 1.0
  occ_weight: 1.0
  count_weight: 0.5
