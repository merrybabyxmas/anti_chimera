seed: 42
output_dir: outputs/cogvideox_2b_real_oracle

data:
  type: manifest
  manifest_path: data/train.jsonl
  val_manifest_path: data/val.jsonl
  root_dir: .
  synthetic_fallback: false
  scene_hint_mode: minimal
  num_frames: 12
  image_size: 64
  max_objects: 3
  depth_bins: 4

planner: {}

model:
  backend: cogvideox
  variant: 2b
  pretrained_model_name_or_path: /path/to/cogvideox-2b
  transformer_subfolder: transformer
  tokenizer_subfolder: tokenizer
  text_encoder_subfolder: text_encoder
  vae_subfolder: vae
  scheduler_subfolder: scheduler
  freeze_text_encoder: true
  freeze_vae: true

training:
  batch_size: 1
  num_workers: 0
  epochs: 10
  lr: 0.0001
  weight_decay: 0.0
  grad_clip: 1.0
  amp: false
  device: cuda
  cogvideox_trainer: v2
  sample_every: 1

sampling:
  num_steps: 50
  guidance_scale: 1.5
